name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check formatting
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Type-check
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Validate character assets
        run: pnpm validate:characters
      - name: Production build
        run: pnpm build
      - name: Report bundle size
        run: pnpm size

  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      LIBGL_ALWAYS_SOFTWARE: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Chromium and Linux dependencies
        run: pnpm exec playwright install --with-deps chromium
      - name: Run playable browser smoke tests
        run: pnpm test:e2e
      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playable-browser-smoke
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

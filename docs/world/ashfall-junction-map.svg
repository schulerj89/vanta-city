<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="720" viewBox="0 0 900 720" role="img" aria-labelledby="title desc">
  <title id="title">Ashfall Junction construction map</title>
  <desc id="desc">Top-down construction map of Ashfall Junction and the spline-derived East Quay curved road expansion.</desc>
  <style>
